networks:
  dashboard-network:
    driver: bridge

services:
  postgres:
    image: postgres:18-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1111
    ports:
      - "5432:5432"
    networks:
      - dashboard-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      

  api:
    build:
      context: .
      dockerfile: DashBoard.Api/Dockerfile
    container_name: dashboard-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=dashboard;Username=postgres;Password=1111
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - dashboard-network

  web:
    build:
      context: .
      dockerfile: DashBoard.Web/Dockerfile
    container_name: dashboard-web
    environment:
      - API_URL=http://api:8080
      - ASPNETCORE_ENVIRONMENT=Development 
    ports:
      - "5000:8080"     
    depends_on:
      - api
    networks:
      - dashboard-network

volumes:
  postgres_data: